name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login exitoso en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Forzamos la inyección real de los ARG definidos en tu Dockerfile
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: mirakel14/cal-diy:latest
          build-args: |
            DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            CALENDSO_ENCRYPTION_KEY=${{ secrets.CALENDSO_ENCRYPTION_KEY }}
            NEXT_PUBLIC_API_V2_URL=https://cal-diy-5gp6.onrender.com/api/v2
            NEXT_PUBLIC_WEBAPP_URL=https://cal-diy-5gp6.onrender.com
            MAX_OLD_SPACE_SIZE=4096