name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login perfecto y estándar en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Reemplaza 'tu_usuario_dockerhub' por tu alias real de Docker Hub
          tags: tu_usuario_dockerhub/cal-diy:latest
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal-diy-5gp6.onrender.com
            NEXT_PUBLIC_API_V2_URL=https://cal-diy-5gp6.onrender.com/api/v2
            DATABASE_URL=postgresql://neondb_owner:npg_FtRB0UmA4xSf@ep-odd-dream-aj47re39.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
            NEXTAUTH_SECRET=oE5gMYeIhw1M1gliGrH7YiaO6/QbexADXzvZ9viFQ8U=
            CALENDSO_ENCRYPTION_KEY=oseGE1nkAkxzMnNPGAtwtE0sqsikjxbZ
            MAX_OLD_SPACE_SIZE=4096