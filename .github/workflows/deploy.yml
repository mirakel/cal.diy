name: Build and Push to Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Mantenemos tu bypass de IP que funcionó impecable
      - name: Force Render Edge IP in Hosts File
        run: |
          echo "216.24.57.3 cr.render.com" | sudo tee -a /etc/hosts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SOLUCIÓN: Login nativo con tubería limpia y variables explícitas
      - name: Log in to Render Registry (Native CLI)
        run: |
          echo "${{ secrets.RENDER_REGISTRY_PASSWORD }}" | docker login cr.render.com --username "usr-d917jg19rddc73dbivd0" --password-stdin

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: cr.render.com/usr-d917jg19rddc73dbivd0/cal-diy:latest
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal-diy-0sh7.onrender.com
            NEXT_PUBLIC_API_V2_URL=https://cal-diy-0sh7.onrender.com/api/v2
            DATABASE_URL=postgresql://neondb_owner:npg_FtRB0UmA4xSf@ep-odd-dream-aj47re39.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
            NEXTAUTH_SECRET=oE5gMYeIhw1M1gliGrH7YiaO6/QbexADXzvZ9viFQ8U=
            CALENDSO_ENCRYPTION_KEY=oseGE1nkAkxzMnNPGAtwtE0sqsikjxbZ
            MAX_OLD_SPACE_SIZE=4096